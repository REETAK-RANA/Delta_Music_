<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DELTA MUSIC</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="container">

    <div class="left">

        <div class="logo">
            △ DELTA MUSIC
        </div>

        <img
            src="{{ url_for('static', filename='images/music-person.png') }}"
            class="music-person"
            alt="Music Listener">

        <div class="hero-content">

            <h1>
                Music<br>
                Redefined.
            </h1>

            <p>
                Stream millions of songs.<br>
                Create playlists.<br>
                Discover new artists.
            </p>

        </div>

        <div class="bottom-content">

            <div class="wave-container">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

            <div class="floating-icons">

                <i class="fas fa-music"></i>

                <i class="fas fa-headphones"></i>

                <i class="fas fa-compact-disc"></i>

            </div>

        </div>

    </div>

    <div class="right">

        <div class="card">

            <h2>Welcome Back</h2>

            <p>
                Access your music universe.
            </p>

            <form action="/login" method="POST">

                <input
                    type="email"
                    name="email"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <div class="remember">

                    <input
                        type="checkbox"
                        id="remember">

                    <label for="remember">
                        Remember Me
                    </label>

                </div>

                <button type="submit">

                    <i class="fas fa-play"></i>

                    Login to DELTA MUSIC

                </button>

            </form>

            <div class="divider">
                OR CONTINUE WITH
            </div>

            <div class="socials">

                <button
                    class="social"
                    type="button"
                    onclick="window.open('https://accounts.google.com','_blank')">

                    <i class="fab fa-google"></i>

                    Google

                </button>

                <button
                    class="social"
                    type="button"
                    onclick="window.open('https://appleid.apple.com','_blank')">

                    <i class="fab fa-apple"></i>

                    Apple

                </button>

                <button
                    class="social"
                    type="button"
                    onclick="window.open('https://accounts.spotify.com','_blank')">

                    <i class="fab fa-spotify"></i>

                    Spotify

                </button>

            </div>

            <div class="links">

                <a href="/forgot-password">
                    Forgot Password?
                </a>

                <a href="/register">
                    Sign Up
                </a>

            </div>

            <div class="version">
                DELTA MUSIC v1.0
            </div>

        </div>

    </div>

</div>

</body>

</html>
