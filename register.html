<!DOCTYPE html>
<html>

<head>

    <title>DELTA MUSIC - Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="container">

    <div class="left">

        <div class="logo">
            △ DELTA MUSIC
        </div>

        <h1>
            Join<br>
            DELTA.
        </h1>

        <p>
            Create your account and
            start streaming.
        </p>

    </div>

    <div class="right">

        <div class="card">

            <h2>Create Account</h2>

            <form method="POST" action="/register">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required>

                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required>

                <input
                    type="submit"
                    value="Create Account"
                    style="
                        width:100%;
                        padding:15px;
                        background:red;
                        color:white;
                        border:none;
                        border-radius:10px;
                        cursor:pointer;
                        font-size:16px;
                    ">

            </form>

        </div>

    </div>

</div>

</body>

</html>
